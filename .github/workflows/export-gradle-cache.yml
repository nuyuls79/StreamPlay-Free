name: Export Gradle Cache

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/export-gradle-cache.yml"
      - "build.gradle.kts"
      - "gradle.properties"

permissions:
  contents: read

jobs:
  export:
    name: Export Gradle Cache
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Resolve Cloudstream jar URL
        id: cloudstream
        run: |
          JAR_URL="$(grep '^cloudstream.jar.url=' gradle.properties | cut -d= -f2-)"
          if [ -z "$JAR_URL" ]; then
            echo "cloudstream.jar.url is missing from gradle.properties"
            exit 1
          fi
          echo "jar_url=$JAR_URL" >> "$GITHUB_OUTPUT"

      - name: Download Cloudstream jar
        run: |
          mkdir -p "$HOME/.gradle/caches/cloudstream/cloudstream"
          curl -L --retry 3 --fail             -o "$HOME/.gradle/caches/cloudstream/cloudstream/cloudstream.jar"             "${{ steps.cloudstream.outputs.jar_url }}"
          ls -lah "$HOME/.gradle/caches/cloudstream/cloudstream"

      - name: Populate Gradle cache
        run: |
          ./gradlew :NoDrakorID:compileDebugKotlin --no-daemon || true

      - name: Pack Gradle cache
        run: |
          mkdir -p gradle-cache-export
          tar -czf gradle-cache-export/gradle-local-cache.tar.gz             -C "$HOME"             .gradle

          ls -lah gradle-cache-export

      - name: Pack Android SDK
        run: |
          mkdir -p android-sdk-export

          tar -czf android-sdk-export/android-sdk-minimal.tar.gz             -C "$ANDROID_HOME"             platforms/android-36             build-tools/34.0.0             platform-tools             licenses

          ls -lah android-sdk-export

      - name: Upload Gradle cache artifact
        uses: actions/upload-artifact@v4
        with:
          name: gradle-local-cache
          path: gradle-cache-export/gradle-local-cache.tar.gz
          retention-days: 3

      - name: Upload Android SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-sdk-minimal
          path: android-sdk-export/android-sdk-minimal.tar.gz
          retention-days: 3
